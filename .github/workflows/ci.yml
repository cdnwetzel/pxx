name: CI

# Runs the full suite on every push and PR — the safety net that was missing
# (Phase 0.5 Tier A). Until this existed, the 851 tests ran only through a
# local pre-commit hook the author could skip, so a regression could reach
# main or ship in a release caught by nobody.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # governance scans use git ls-files / diff
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Lint
        # Scoped to pxx/ + tests/ — the project's canonical lint surface
        # (matches pxx/self_modes.py::self_lint). The vendored
        # services/docs-rag-sme/ subpackage owns its own formatting.
        run: |
          uv run ruff check pxx/ tests/
          uv run ruff format --check pxx/ tests/
      - name: Tests
        run: uv run pytest -q
      - name: Public-content gate (shipped files)
        # --allow-empty-denylist: CI (incl. fork PRs) has no access to the
        # untracked hostname denylist, so hostname coverage is off here by
        # design — the scan runs structural patterns (IP/domain/home-path) and
        # prints a loud coverage-disabled WARNING without failing. The ARMED
        # gate that soft-fails on missing coverage is release.yml, which
        # materializes the denylist from a secret. See governance P0.
        run: uv run pxx --check --shipped --allow-empty-denylist
      - name: Full-tree de-identification gate (structural)
        # Full tree (docs/plans/deploy/config), fork-PR-safe: structural
        # patterns + a loud coverage-disabled warning (no secret on PRs). The
        # ARMED full-tree gate that catches bare fleet identifiers is release.yml.
        run: uv run pxx --check --all-files --allow-empty-denylist
