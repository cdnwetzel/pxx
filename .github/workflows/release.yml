name: release

on:
  push:
    tags: ["v*"]
  # TestPyPI rehearsal: Actions → release → Run workflow (from the v2 branch,
  # at an rc version). The dispatch path publishes ONLY to TestPyPI — prod
  # PyPI stays tag-push-only (see the publish job's event guards).
  workflow_dispatch:
    inputs:
      repository:
        description: "Rehearsal target (prod publishes are tag-push only)"
        required: true
        default: testpypi
        type: choice
        options: [testpypi]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1, SHA-pinned
        with:
          fetch-depth: 0  # release-integrity ancestry check needs history
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2, SHA-pinned

      - name: Release integrity (version pins agree; reachable commit)
        run: |
          set -euo pipefail
          PYPROJECT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PKG=$(python3 -c "import sys; sys.path.insert(0, '.'); import pxx; print(pxx.__version__)")
          echo "event=$GITHUB_EVENT_NAME ref=$GITHUB_REF_NAME pyproject=$PYPROJECT package=$PKG"
          if [ "$PYPROJECT" != "$PKG" ]; then
            echo "::error::version mismatch: pyproject=$PYPROJECT package=$PKG"
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # TestPyPI rehearsal runs from the branch — no tag to match, but
            # the version MUST be an rc so no final release number burns.
            case "$PYPROJECT" in
              *rc[0-9]*) ;;
              *) echo "::error::rehearsal requires an rc version, got $PYPROJECT"; exit 1 ;;
            esac
          else
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$PYPROJECT" ]; then
              echo "::error::version mismatch: tag=$TAG pyproject=$PYPROJECT package=$PKG"
              exit 1
            fi
          fi
          # the API /v1/health version is pxx.__version__ (server.py imports it)
          grep -q 'from . import __version__' pxx/server.py
          # the release commit must be reachable from the release branch
          if ! git merge-base --is-ancestor HEAD origin/v2; then
            echo "::error::release commit is not reachable from origin/v2"
            exit 1
          fi

      - name: Install
        run: uv venv && uv pip install -e ".[dev,server]" --python .venv/bin/python

      - name: Lint
        run: |
          .venv/bin/ruff check pxx tests
          .venv/bin/ruff format --check pxx tests

      - name: Test (no network, no Ollama, no aider required)
        run: .venv/bin/python -m pytest

      - name: "Eval self-check (every corpus case: honest passes, cheat caught)"
        run: .venv/bin/pxx eval self-check

      - name: ARMED content gate (fails on empty denylist — the 1.3.x silent-green bug)
        env:
          PXX_CONTENT_DENYLIST: ${{ secrets.PXX_CONTENT_DENYLIST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config/pxx
          printf '%s\n' "${PXX_CONTENT_DENYLIST:-}" > ~/.config/pxx/public-denylist
          # --require-denylist: the gate FAILS when the denylist loads empty.
          .venv/bin/pxx check --all-files --require-denylist

      - name: Build sdist + wheel
        run: uv build

      - name: Wheel smoke (install into a throwaway venv, verify contract)
        run: |
          set -euo pipefail
          VENV=$(mktemp -d)/venv
          python3 -m venv "$VENV"
          "$VENV/bin/pip" install dist/*.whl >/dev/null
          "$VENV/bin/pxx" --version
          "$VENV/bin/python" -c "import pxx, pxx.eval, pxx.improve; from importlib.resources import files; files('pxx').joinpath('prompts/native_system.md').read_text(); print('wheel smoke: ok')"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1, SHA-pinned
        with:
          name: artifact
          path: dist/

  publish:
    needs: verify
    runs-on: ubuntu-latest
    # PyPI trusted-publisher binding: cdnwetzel/pxx + release.yml + environment
    # pypi (registered on the pxx-orchestrator project; must match this job —
    # TestPyPI needs its own same-values registration, an operator item).
    environment: pypi
    permissions:
      id-token: write  # PyPI OIDC trusted publisher (no stored token)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1, SHA-pinned
        with:
          name: artifact
          path: dist
      - name: Publish to TestPyPI (OIDC rehearsal)
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1, SHA-pinned
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI (OIDC)
        if: github.event_name == 'push'  # prod is tag-push-only, never dispatch
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1, SHA-pinned
