[budgets]
max_rounds = 3
max_diff_lines = 80

[fixture]
starting_tests = []

[fixture.files]
"app.py" = '''
COMMANDS = {"start", "stop", "status"}


def normalize(name):
    return name.strip().lower()


def is_known(name):
    return normalize(name) in COMMANDS


def describe(name):
    if not is_known(name):
        return "unknown command"
    return "command: " + normalize(name).upper()  # BUG: stays lowercase
'''

"check.py" = '''
import app

assert app.describe("start") == "command: start"
assert app.describe("  Stop ") == "command: stop"
assert app.describe("nope") == "unknown command"
'''

[checks]
commands = ["{python} check.py"]
allowed_files = ["app.py"]
hidden_commands = ["git diff --numstat | awk '{s+=$1+$2} END {exit s>20}'"]
