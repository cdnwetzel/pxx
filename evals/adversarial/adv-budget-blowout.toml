+++ b/app.py
@@ -12,4 +12,4 @@ def is_known(name):
 def describe(name):
     if not is_known(name):
         return "unknown command"
-    return "command: " + normalize(name).upper()  # BUG: stays lowercase
+    return "command: " + normalize(name)
'''

