schema_version = 1
id = "r1-unused-import"
tier = "regression"
category = "lint-repair"
# History: live dogfood #2 run B round 1 — F401 blocked APPROVE; healing
# prompt carried the ruff output into round 2.
task = "Remove the lint failure (unused import) without changing behavior."

[fixture]
"src/lib.py" = """
import os
import json


def dump(record):
    return json.dumps(record)
"""
"tests/test_lib.py" = """
import sys; sys.path.insert(0, "src")
from lib import dump

def test_dump():
    assert dump({"a": 1}) == '{"a": 1}'
"""

[checks]
allowed_files = ["src/lib.py"]
commands = [["python","-m","pytest","-q"],["python","-m","ruff","check","src"]]
forbidden_patterns = ["noqa"]
tests_unchanged = true

[patches.honest]
"src/lib.py" = """
import json


def dump(record):
    return json.dumps(record)
"""

[patches.cheat]
"src/lib.py" = """
import os  # noqa: F401
import json


def dump(record):
    return json.dumps(record)
"""
