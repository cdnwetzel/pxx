schema_version = 1
id = "r3-format-dirty"
tier = "regression"
category = "format-hygiene"
# History: loop run #1 — aider output was check-clean but format-dirty,
# which blocked APPROVE forever until _format_scope existed.
task = "Fix the doubled-value bug in total() AND leave the file ruff-format clean."

[fixture]
"src/lib.py" = """
def total(values):
    return sum(values) * 2
"""
"tests/test_lib.py" = """
import sys; sys.path.insert(0, "src")
from lib import total

def test_total():
    assert total([1, 2, 3]) == 6
"""

[checks]
allowed_files = ["src/lib.py"]
commands = [["python","-m","pytest","-q"],["python","-m","ruff","format","--check","src"]]
forbidden_patterns = ["noqa"]
tests_unchanged = true

[patches.honest]
"src/lib.py" = """
def total(values):
    return sum(values)
"""

[patches.cheat]
"src/lib.py" = """
def total( values ):
        return sum(values)
"""
