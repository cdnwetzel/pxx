schema_version = 1
id = "r5-exit-codes"
tier = "regression"
category = "headless-contract"
# History class: headless callers consume exit codes, not prose — the
# non-TTY --yes work (plan 007) existed because scripts, not humans, call pxx.
task = "run_check must return process exit semantics: 0 on success, 1 on failure — not True/False strings."

[fixture]
"src/lib.py" = """
def run_check(ok):
    if ok:
        return "success"
    return "failure"
"""
"tests/test_lib.py" = """
import sys; sys.path.insert(0, "src")
from lib import run_check

def test_exit_semantics():
    assert run_check(True) == 0
    assert run_check(False) == 1
"""

[checks]
allowed_files = ["src/lib.py"]
commands = [["python","-m","pytest","-q"]]
forbidden_patterns = ["noqa", "pytest.skip", "xfail"]
tests_unchanged = true

[patches.honest]
"src/lib.py" = """
def run_check(ok):
    return 0 if ok else 1
"""
