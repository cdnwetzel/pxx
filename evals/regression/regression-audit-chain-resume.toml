[fixture.files]
"chain.py" = '''
import hashlib
import json
import os

GENESIS = "0" * 64


def _hash(payload, prev_hash):
    blob = json.dumps(payload, sort_keys=True) + prev_hash
    return hashlib.sha256(blob.encode()).hexdigest()


def append(path, payload):
    prev_hash = GENESIS
    if os.path.exists(path):
        with open(path) as fh:
            lines = fh.read().splitlines()
    entry = {"payload": payload, "prev_hash": prev_hash}
    entry["hash"] = _hash(payload, prev_hash)
    with open(path, "a") as fh:
        fh.write(json.dumps(entry) + "\n")


def verify(path):
    prev = GENESIS
    with open(path) as fh:
        for line in fh:
            entry = json.loads(line)
            if entry["prev_hash"] != prev:
                return False
            if entry["hash"] != _hash(entry["payload"], prev):
                return False
            prev = entry["hash"]
    return True
'''
"check.py" = '''
import chain

chain.append("audit.jsonl", {"n": 1})
chain.append("audit.jsonl", {"n": 2})
assert chain.verify("audit.jsonl")
'''
"hidden_check.py" = '''
import json

import chain

entry = {"payload": {"n": 1}, "prev_hash": chain.GENESIS, "hash": "tampered"}
with open("audit.jsonl", "w") as fh:
    fh.write(json.dumps(entry) + "\n")
assert not chain.verify("audit.jsonl")
'''

