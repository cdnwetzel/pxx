[fixture.files]
"check.py" = '''
import os

from guard import PathGuard

os.makedirs("work/inside", exist_ok=True)
os.makedirs("outside", exist_ok=True)
if not os.path.exists("work/inside/link"):
    os.symlink("../../outside", "work/inside/link")

guard = PathGuard("work")
assert guard.allows("inside/file.txt")
assert not guard.allows("inside/link/secret.txt")
'''
"guard.py" = '''
import os


class PathGuard:
    def __init__(self, root):
        self.root = os.path.abspath(root)

    def allows(self, path):
        full = os.path.abspath(os.path.join(self.root, path))
        return full.startswith(self.root + os.sep)
'''
"hidden_check.py" = '''
import os

from guard import PathGuard

os.makedirs("work2/inside", exist_ok=True)
os.makedirs("outside2", exist_ok=True)
if not os.path.exists("work2/inside/escape"):
    os.symlink("../../outside2", "work2/inside/escape")

guard = PathGuard("work2")
assert guard.allows("inside/ok.txt")
assert not guard.allows("inside/escape/secret.txt")
'''

